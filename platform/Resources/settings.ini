; Configuration file for the workspace  
;  
; This INI file defines settings for environment variables, file system access,  
; registry management, and placeholder replacement within the workspace. Each
; section provides structured rules for consistent behavior when attaching or
; detaching the workspace.
;
; MODIFY WITH CAUTION. INCORRECT VALUES MAY AFFECT WORKSPACE FUNCTIONALITY.


; The ENVIRONMENT section defines keys and values for environment variables.
; Keys start with a letter or an underscore, followed by alphanumeric
; characters, a hyphen, an underscore, or a dot, and end alphanumerically or
; with an underscore. Keys and values are separated by an equal sign. Spaces
; before or after the equal sign are optional. If a key is defined multiple
; times, the last assigned value is always used; previous values are
; overwritten.
;
; The environment variables defined here can be used as placeholders in the
; following configuration in the format #[name].
;
; The following environment variables are reserved and cannot be overridden:
;    PLATFORM_NAME, PLATFORM_HOME, PLATFORM_DISK, PLATFORM_APP,
;    PLATFORM_HOMEDRIVE
[ENVIRONMENT]



; The FILESYSTEM section is used when applications in the workspace need to
; access specific data from the host system, such as user profile or ProgramData
; directories. For this purpose, the workspace provides a dedicated storage
; directory. When attaching the workspace, the files and directories defined in
; this section are linked to the host system using symbolic links, without
; integrating the entire workspace filesystem. When detaching the workspace,
; these symbolic links are removed from the host system again.  
;
; This section expects and processes absolute paths with drive letters. It is  
; recommended to define paths using system environment variables, as this  
; increases flexibility and reduces dependencies on user accounts.
;
;    %ALLUSERSPROFILE%, %APPDATA%, %COMMONPROGRAMFILES%,
;    %COMMONPROGRAMFILES(X86)%, %COMMONPROGRAMW6432%, %HOMEPATH%,
;    %LOCALAPPDATA%, %PROGRAMFILES%, %PROGRAMFILES%, %PROGRAMFILES(X86)%,
;    %PUBLIC%, %SYSTEMDRIVE%, %SYSTEMROOT%, %USERPROFILE%, %WINDIR%, ...
;
; Drive letters must be enclosed in percent signs, similar to environment
; variables. Unlike regular paths, drives begin with two percent signs (e.g.
; %%C%).
;
; If the target drive does not exist, the corresponding path is skipped, and the
; process continues without error.  
;
; Nested symbolic links are not supported. If a parent path has already been
; created as a symbolic link (e.g. C:\1\2\3), no additional symbolic links can
; be created to a sub-path of this directory (e.g. C:\1\2\3\4\5). If a parent
; directory already exists on the host filesystem and is not defined as a
; symbolic link within this configuration, symbolic links may still be created
; for any of its subdirectories.
[FILESYSTEM]



; The REGISTRY section specifies the registry keys and values that applications
; in the workspace require on the host system, such as HKEY_CURRENT_USER or
; HKEY_LOCAL_MACHINE. For this purpose, the workspace provides a dedicated
; storage directory along with the registry.data file for storing registry
; entries.
;
; When attaching the workspace, the defined registry entries are temporarily
; imported into the Windows Registry on the host system. When detaching the
; workspace, changes made within the workspace are saved to registry.data before
; the temporary registry entries are removed. Pre-existing registry entries on
; the host system remain unchanged.
;
; This section specifies the registry paths corresponding to the entries stored
; in registry.data. Both registry keys and individual registry values are
; supported. Registry values are specified by appending the value name to the
; key path, separated by a colon.
[REGISTRY]



; The PATCHES section defines the files to be patched when the workspace is
; attached. Each entry is a file path whose contents are processed by replacing
; placeholders in the form #[name] with values from the ENVIRONMENT section
; and/or system environment variables with the same name. Replacements are
; applied each time the workspace is attached. File paths must begin with a
; forward slash (/) or a backslash (\). Paths beginning with a drive letter are
; not supported, as all paths are resolved relative to the workspace drive.
; Invalid paths are ignored.
[PATCHES]
